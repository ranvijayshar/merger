<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Chat - Premium Edition</title>
    <style>
        /* Base Theme with Animated Gradient */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(-45deg, #0a0a0a, #1a1a2e, #16213e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Main App Container */
        .chat-container { 
            width: 100%;
            max-width: 450px; 
            background: #1a1a1a; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 20px rgba(0, 123, 255, 0.1); 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            height: 85vh; 
            max-height: 750px;
            z-index: 10; 
            border: 1px solid #2a2a2a;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease-in-out;
            will-change: transform, opacity;
            position: relative; 
            overflow: hidden; 
        }

        /* Top Nav Bar */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333;
        }
        .top-nav h2 { margin: 0; font-weight: 600; letter-spacing: 1px; color: #eee; font-size: 1.4em; }
        
        .profile-pic-btn {
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            border: 2px solid #007bff; transition: transform 0.2s; object-fit: cover;
        }
        .profile-pic-btn:hover { transform: scale(1.1); }

        /* --- SCREENS --- */
        #login-screen, #chat-interface, #profile-screen {
            display: none; flex-direction: column; height: 100%; width: 100%; animation: fadeIn 0.3s ease;
        }

        /* 1. Login Screen */
        #login-screen { justify-content: center; align-items: center; text-align: center; }
        #login-screen h1 { font-size: 2.2em; margin-bottom: 10px; background: -webkit-linear-gradient(#007bff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #login-screen p { color: #888; margin-bottom: 30px; }
        
        .google-btn {
            background: white; color: #333; border: none; padding: 12px 24px; border-radius: 25px;
            font-weight: bold; font-size: 1.1em; cursor: pointer; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2); transition: all 0.2s;
        }
        .google-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255,255,255,0.3); }
        .google-btn img { width: 20px; }

        /* 2. Chat Interface */
        #chat-box { flex-grow: 1; border-radius: 12px; padding: 15px; overflow-y: auto; margin-bottom: 15px; background: #111111; display: flex; flex-direction: column; gap: 12px; }
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .message { padding: 12px 18px; border-radius: 20px; max-width: 75%; word-wrap: break-word; line-height: 1.4; font-size: 0.95em; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; transform-origin: bottom; }
        @keyframes popIn { 0% { opacity: 0; transform: translateY(20px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .my-msg { background: linear-gradient(135deg, #0062cc, #007bff); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2); }
        .stranger-msg { background: #2d2d2d; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); }
        .system-msg { text-align: center; color: #888; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; align-self: center; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; }

        .controls { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 14px 20px; background: #222; border: 1px solid #333; color: white; border-radius: 25px; outline: none; font-size: 1em; transition: all 0.3s ease; }
        input[type="text"]:focus { border-color: #007bff; }
        input[type="text"]:disabled { background: #1a1a1a; cursor: not-allowed; }

        button.action-btn { padding: 0 20px; border: none; background: #007bff; color: white; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; text-transform: uppercase; font-size: 0.9em; }
        button.action-btn:hover:not(:disabled) { background: #0056b3; transform: translateY(-2px); }
        button.action-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        #start-btn { background: linear-gradient(135deg, #ff416c, #ff4b2b); margin-top: 15px; width: 100%; font-size: 1.1em; padding: 16px; border-radius: 12px; border: none; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 65, 108, 0.3); transition: all 0.2s; }
        #start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 65, 108, 0.5); }
        #skip-hint { display: none; text-align: center; color: #777; font-size: 0.85em; margin-top: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* 3. Profile Screen */
        .nav-item { width: 60px; } /* Keeps the title centered */
        .back-btn { background: none; border: none; color: #007bff; font-size: 1.1em; cursor: pointer; display: flex; align-items: center; padding: 0; font-weight: bold; }
        .back-btn:hover { color: #0056b3; }
        
        /* New Settings Gear Button */
        .settings-btn { background: none; border: none; font-size: 1.6em; cursor: pointer; padding: 0; text-align: right; transition: transform 0.3s ease; width: 100%; color: #aaa; }
        .settings-btn:hover { transform: rotate(90deg); color: white; }

        .profile-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .profile-img-large { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 20px; border: 4px solid #007bff; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .profile-content h3 { margin: 0 0 5px 0; font-size: 1.8em; color: #fff; }
        .profile-content p { color: #aaa; font-size: 1em; margin-bottom: 40px; }
        
        .danger-btn { background: #dc3545; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; font-size: 1.1em; cursor: pointer; width: 100%; transition: all 0.2s; }
        .danger-btn:hover { background: #c82333; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3); }

        /* Modals */
        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); border-radius: 20px; display: none; justify-content: center; align-items: center; z-index: 100; animation: fadeIn 0.2s ease forwards; }
        .modal-content { background: #222; padding: 30px; border-radius: 15px; text-align: center; width: 80%; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        
        /* Close button for settings */
        .close-modal-btn { position: absolute; top: 10px; right: 15px; background: none; border: none; color: #888; font-size: 1.5em; cursor: pointer; }
        .close-modal-btn:hover { color: white; }

        /* Skip Confirmation Modal */
        .modal-content h3 { margin-top: 0; color: #fff; margin-bottom: 10px; }
        .modal-content p { color: #ccc; font-size: 0.9em; margin-bottom: 25px; line-height: 1.4; }
        .modal-buttons { display: flex; gap: 15px; justify-content: center; }
        .modal-buttons button { padding: 12px 20px; border-radius: 8px; flex: 1; font-size: 1em; border: none; cursor: pointer; font-weight: bold; }
        #btn-stay { background: #444; color: white; }
        #btn-leave { background: #dc3545; color: white; }

        /* New Settings Modal specific styles */
        .settings-content { text-align: left; }
        .settings-content h3 { text-align: center; border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 20px; }
        .settings-item { background: #333; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; text-align: left; font-size: 1em; cursor: pointer; margin-bottom: 10px; transition: background 0.2s; font-weight: bold; }
        .settings-item:hover { background: #444; }
    </style>
</head>
<body>

<div class="chat-container" id="main-container">
    
    <div id="login-screen">
        <h1>Random Chat</h1>
        <p>Connect with strangers instantly.</p>
        <button id="login-btn" class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
            Sign in with Google
        </button>
    </div>

    <div id="chat-interface">
        <div class="top-nav">
            <h2>Random Chat</h2>
            <img id="nav-profile-pic" class="profile-pic-btn" src="" alt="Profile" title="Open Profile">
        </div>

        <div id="chat-box">
            <div class="message system-msg">Click below to start your first chat!</div>
        </div>
        
        <div class="controls">
            <input type="text" id="msg-input" placeholder="Type a message..." disabled autocomplete="off">
            <button id="send-btn" class="action-btn" disabled>Send</button>
        </div>
        
        <button id="start-btn">Start Chatting</button>
        <div id="skip-hint">⏬ Swipe up, scroll, or press ↓ to skip ⏬</div>
    </div>

    <div id="profile-screen">
        <div class="top-nav">
            <div class="nav-item">
                <button id="back-to-chat-btn" class="back-btn">← Back</button>
            </div>
            <h2>My Profile</h2>
            <div class="nav-item">
                <button id="open-settings-btn" class="settings-btn" title="Settings">⚙️</button>
            </div>
        </div>
        
        <div class="profile-content">
            <img id="page-profile-pic" class="profile-img-large" src="" alt="Profile">
            <h3 id="page-profile-name">User Name</h3>
            <p id="page-profile-email">user@email.com</p>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content settings-content">
            <button id="close-settings-btn" class="close-modal-btn">&times;</button>
            <h3>Settings</h3>
            <button class="settings-item">✏️ Edit Profile</button>
            <button class="settings-item">🔔 Notifications</button>
            <button class="settings-item">🔒 Privacy Policy</button>
            <button id="btn-logout" class="danger-btn" style="margin-top: 20px;">Sign Out</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Skip Stranger?</h3>
            <p>Are you sure you want to leave this conversation?</p>
            <div class="modal-buttons">
                <button id="btn-stay">Stay</button>
                <button id="btn-leave">Leave</button>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, onSnapshot, serverTimestamp, arrayUnion, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsFseykAMdcZhtW3fpg0nQiMd6datK55E",
        authDomain: "projectsocial-6db6d.firebaseapp.com",
        projectId: "projectsocial-6db6d",
        storageBucket: "projectsocial-6db6d.firebasestorage.app",
        messagingSenderId: "336903363566",
        appId: "1:336903363566:web:bfb18dfcb471bcf4484cff"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // DOM Elements - Screens
    const container = document.getElementById('main-container'); 
    const loginScreen = document.getElementById('login-screen');
    const chatInterface = document.getElementById('chat-interface');
    const profileScreen = document.getElementById('profile-screen');
    
    // Chat Elements
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const startBtn = document.getElementById('start-btn');
    const skipHint = document.getElementById('skip-hint');
    
    // Auth & Profile Elements
    const loginBtn = document.getElementById('login-btn');
    const navProfilePic = document.getElementById('nav-profile-pic');
    const backToChatBtn = document.getElementById('back-to-chat-btn');
    const pageProfilePic = document.getElementById('page-profile-pic');
    const pageProfileName = document.getElementById('page-profile-name');
    const pageProfileEmail = document.getElementById('page-profile-email');
    
    // Settings & Logout Elements
    const openSettingsBtn = document.getElementById('open-settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const closeSettingsBtn = document.getElementById('close-settings-btn');
    const btnLogout = document.getElementById('btn-logout');

    // Confirm Skip Elements
    const confirmModal = document.getElementById('confirm-modal');
    const btnStay = document.getElementById('btn-stay');
    const btnLeave = document.getElementById('btn-leave');

    // State
    let currentRoomId = null;
    let unsubscribeRoom = null;
    let hasStarted = false;
    let isSkipping = false; 
    let isChatting = false; 
    let isConfirming = false; 
    let displayedMessageCount = 0; 
    let myUserId = null; 

    // --- NAVIGATION LOGIC ---
    function showScreen(screenElement) {
        loginScreen.style.display = 'none';
        chatInterface.style.display = 'none';
        profileScreen.style.display = 'none';
        screenElement.style.display = 'flex';
    }

    navProfilePic.addEventListener('click', () => { showScreen(profileScreen); });
    
    backToChatBtn.addEventListener('click', () => {
        showScreen(chatInterface);
        chatBox.scrollTo({ top: chatBox.scrollHeight });
    });

    // --- SETTINGS MODAL LOGIC ---
    openSettingsBtn.addEventListener('click', () => { settingsModal.style.display = 'flex'; });
    closeSettingsBtn.addEventListener('click', () => { settingsModal.style.display = 'none'; });
    
    // Close settings if you click the dark background outside the modal
    settingsModal.addEventListener('click', (e) => {
        if(e.target === settingsModal) settingsModal.style.display = 'none';
    });


    // --- AUTHENTICATION LOGIC ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            myUserId = user.uid;
            
            navProfilePic.src = user.photoURL;
            pageProfilePic.src = user.photoURL;
            pageProfileName.textContent = user.displayName;
            pageProfileEmail.textContent = user.email;

            showScreen(chatInterface);
        } else {
            myUserId = null;
            
            if (currentRoomId) {
                updateDoc(doc(db, "rooms", currentRoomId), { status: "closed" }).catch(e => console.error(e));
            }
            resetChat();
            
            showScreen(loginScreen);
            
            // Reset chat UI state
            hasStarted = false;
            startBtn.style.display = 'block';
            skipHint.style.display = 'none';
        }
    });

    loginBtn.addEventListener('click', () => {
        signInWithPopup(auth, provider).catch((error) => {
            console.error("Error signing in:", error);
            alert("Failed to sign in. Did you enable Google Auth in the Firebase Console?");
        });
    });

    btnLogout.addEventListener('click', () => {
        settingsModal.style.display = 'none'; // Close the modal
        signOut(auth); // Sign out
    });

    // --- CORE CHAT LOGIC ---

    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    function resetChat() {
        chatBox.innerHTML = '';
        msgInput.disabled = true;
        sendBtn.disabled = true;
        isChatting = false;
        displayedMessageCount = 0;
        if (unsubscribeRoom) unsubscribeRoom();
        currentRoomId = null;
    }

    function setupRoomListener(roomId) {
        if (unsubscribeRoom) unsubscribeRoom();
        
        unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
            const data = snapshot.data();
            if (!data) return;

            if (data.status === "chatting" && !isChatting) {
                isChatting = true;
                appendMessage("You are now chatting! Say hi 👋", "system-msg");
                msgInput.disabled = false;
                sendBtn.disabled = false;
                msgInput.focus();
            }
            
            if (data.status === "closed" && isChatting) {
                appendMessage("Stranger disconnected.", "system-msg");
                isChatting = false;
                msgInput.disabled = true;
                sendBtn.disabled = true;
                appendMessage("⏬ Swipe or press ↓ to find someone new ⏬", "system-msg");
                if (isConfirming) hideConfirmModal();
            }

            if (isChatting && data.messages && data.messages.length > displayedMessageCount) {
                const newMessages = data.messages.slice(displayedMessageCount);
                newMessages.forEach(msg => {
                    if (msg.senderId !== myUserId) {
                        appendMessage(msg.text, "stranger-msg");
                    }
                });
                displayedMessageCount = data.messages.length;
            }
        });
    }

    async function findStranger() {
        if (!myUserId) return; 
        
        resetChat();
        appendMessage("Looking for a stranger...", "system-msg");

        const roomsRef = collection(db, "rooms");
        const q = query(roomsRef, where("status", "==", "waiting"), limit(1)); 
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
            const roomDoc = querySnapshot.docs[0];
            currentRoomId = roomDoc.id;
            
            await updateDoc(doc(db, "rooms", currentRoomId), {
                status: "chatting",
                peerId: myUserId
            });
            
            setupRoomListener(currentRoomId);
        } else {
            const newRoom = await addDoc(roomsRef, {
                status: "waiting",
                creatorId: myUserId,
                createdAt: serverTimestamp(),
                messages: [] 
            });
            currentRoomId = newRoom.id;
            
            setupRoomListener(currentRoomId);
        }
    }

    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !currentRoomId) return;

        msgInput.value = '';
        appendMessage(text, "my-msg"); 
        displayedMessageCount++; 

        await updateDoc(doc(db, "rooms", currentRoomId), {
            messages: arrayUnion({
                text: text,
                senderId: myUserId,
                timestamp: Date.now()
            })
        });
    }

    // --- SKIP / MODAL LOGIC ---
    function showConfirmModal() { isConfirming = true; confirmModal.style.display = 'flex'; }
    function hideConfirmModal() { isConfirming = false; confirmModal.style.display = 'none'; }
    btnStay.addEventListener('click', hideConfirmModal);
    btnLeave.addEventListener('click', () => { hideConfirmModal(); executeSkipAnimation(); });

    function handleSkipIntent(e, isScrollEvent) {
        if (!hasStarted || isSkipping || isConfirming || !myUserId || profileScreen.style.display === 'flex') return;

        if (isScrollEvent && e.target.closest('#chat-box')) {
            const box = chatBox;
            const isAtBottom = Math.abs((box.scrollHeight - box.scrollTop) - box.clientHeight) < 2;
            if (!isAtBottom) return; 
        }

        if (isChatting && currentRoomId) {
            showConfirmModal();
        } else {
            executeSkipAnimation();
        }
    }

    async function executeSkipAnimation() {
        isSkipping = true;

        if (currentRoomId) {
            const roomToClose = currentRoomId; 
            updateDoc(doc(db, "rooms", roomToClose), { status: "closed" }).catch(e => console.error(e));
        }

        container.style.transform = 'translateY(-100vh) scale(0.9)';
        container.style.opacity = '0';

        setTimeout(() => {
            container.style.transition = 'none'; 
            container.style.transform = 'translateY(100vh) scale(0.9)'; 
            
            findStranger(); 

            void container.offsetWidth; 

            container.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease-in-out';
            container.style.transform = 'translateY(0) scale(1)'; 
            container.style.opacity = '1';

            setTimeout(() => { isSkipping = false; }, 500); 
        }, 300); 
    }

    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none'; 
        skipHint.style.display = 'block'; 
        hasStarted = true;
        findStranger();
    });

    window.addEventListener('wheel', (e) => { if (e.deltaY > 20) handleSkipIntent(e, true); });

    let touchStartY = 0;
    window.addEventListener('touchstart', (e) => { touchStartY = e.changedTouches[0].screenY; });
    window.addEventListener('touchend', (e) => {
        let touchEndY = e.changedTouches[0].screenY;
        if (touchStartY - touchEndY > 50) handleSkipIntent(e, true);
    });

    window.addEventListener('keydown', (e) => {
        if (document.activeElement === msgInput) return;
        if (e.key === 'ArrowDown') handleSkipIntent(e, false);
    });

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    window.addEventListener('beforeunload', () => {
        if (currentRoomId) updateDoc(doc(db, "rooms", currentRoomId), { status: "closed" });
    });
</script>
</body>
</html>
