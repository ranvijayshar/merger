<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Chat - Premium Edition</title>
    <style>
        /* Base Theme with Animated Gradient */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(-45deg, #0a0a0a, #1a1a2e, #16213e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Main App Container - TALLER LAYOUT */
        .chat-container { 
            width: 100%; max-width: 450px; 
            background: #1a1a1a; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 20px rgba(0, 123, 255, 0.1); 
            display: flex; flex-direction: column; 
            height: 96vh; /* Maximized height */
            max-height: 900px; 
            z-index: 10; border: 1px solid #2a2a2a;
            position: relative; overflow: hidden; 
            padding: 0; 
        }

        /* --- BOTTOM NAVIGATION BAR --- */
        #bottom-nav {
            display: none; 
            justify-content: space-around; align-items: center;
            padding: 8px 0; 
            background: #0f0f0f;
            border-top: 1px solid #2a2a2a; z-index: 20;
        }
        .nav-tab {
            display: flex; flex-direction: column; align-items: center;
            color: #666; cursor: pointer; transition: all 0.2s; width: 50%;
            font-size: 0.8em; font-weight: 600;
        }
        .nav-tab:hover { color: #aaa; }
        .nav-tab.active { color: #007bff; }
        .nav-icon { font-size: 1.4em; margin-bottom: 2px; transition: transform 0.2s; }
        .nav-tab.active .nav-icon { transform: scale(1.15); }

        .tab-profile-pic {
            width: 22px; height: 22px; border-radius: 50%; object-fit: cover;
            margin-bottom: 2px; border: 2px solid transparent; transition: all 0.2s;
        }
        .nav-tab.active .tab-profile-pic { border-color: #007bff; transform: scale(1.1); }

        /* --- SCREENS --- */
        #login-screen, #chat-interface, #profile-screen {
            display: none; flex-direction: column; flex-grow: 1; 
            width: 100%; box-sizing: border-box; 
            padding: 15px 20px; 
            overflow: hidden; 
        }

        @keyframes slideInFromRight { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInFromLeft { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Top Navs */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #333;
        }
        .top-nav h2 { margin: 0; font-weight: 600; letter-spacing: 1px; color: #eee; font-size: 1.25em; } 
        .nav-item { width: 40px; } 
        .settings-btn { background: none; border: none; font-size: 1.5em; cursor: pointer; padding: 0; text-align: right; transition: transform 0.3s ease; width: 100%; color: #aaa; }
        .settings-btn:hover { transform: rotate(90deg); color: white; }

        /* 1. Login Screen */
        #login-screen { justify-content: center; align-items: center; text-align: center; animation: fadeIn 0.4s ease; padding-bottom: 40px;}
        #login-screen h1 { font-size: 2.2em; margin-bottom: 10px; background: -webkit-linear-gradient(#007bff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #login-screen p { color: #888; margin-bottom: 30px; }
        .google-btn { background: white; color: #333; border: none; padding: 12px 24px; border-radius: 25px; font-weight: bold; font-size: 1.1em; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(255,255,255,0.2); transition: all 0.2s; }
        .google-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255,255,255,0.3); }
        .google-btn img { width: 20px; }

        /* 2. Chat Interface */
        #chat-box { flex-grow: 1; border-radius: 12px; padding: 12px; overflow-y: auto; margin-bottom: 10px; background: #111111; display: flex; flex-direction: column; gap: 10px; }
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .message { padding: 10px 15px; border-radius: 20px; max-width: 75%; word-wrap: break-word; line-height: 1.4; font-size: 0.95em; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; transform-origin: bottom; }
        @keyframes popIn { 0% { opacity: 0; transform: translateY(20px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .my-msg { background: linear-gradient(135deg, #0062cc, #007bff); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2); }
        .stranger-msg { background: #2d2d2d; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); }
        .system-msg { text-align: center; color: #888; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; align-self: center; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 20px; }

        .controls { display: flex; gap: 8px; }
        input[type="text"] { flex-grow: 1; padding: 12px 16px; background: #222; border: 1px solid #333; color: white; border-radius: 25px; outline: none; font-size: 0.95em; transition: all 0.3s ease; }
        input[type="text"]:focus { border-color: #007bff; }
        input[type="text"]:disabled { background: #1a1a1a; cursor: not-allowed; }

        button.action-btn { padding: 0 16px; border: none; background: #007bff; color: white; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; text-transform: uppercase; font-size: 0.85em; }
        button.action-btn:hover:not(:disabled) { background: #0056b3; transform: translateY(-2px); }
        button.action-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        #start-btn { background: linear-gradient(135deg, #ff416c, #ff4b2b); margin-top: 10px; width: 100%; font-size: 1.05em; padding: 12px; border-radius: 12px; border: none; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 65, 108, 0.3); transition: all 0.2s; }
        #start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 65, 108, 0.5); }
        #skip-hint { display: none; text-align: center; color: #777; font-size: 0.8em; margin-top: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* 3. Profile Screen */
        .profile-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; user-select: none; }
        .profile-img-large { width: 110px; height: 110px; border-radius: 50%; margin-bottom: 20px; border: 4px solid #007bff; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .profile-content h3 { margin: 0 0 5px 0; font-size: 1.6em; color: #fff; }
        .profile-content p { color: #aaa; font-size: 0.95em; margin-bottom: 40px; }

        /* Modals & Overlays */
        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); border-radius: 20px; display: none; justify-content: center; align-items: center; z-index: 100; animation: fadeIn 0.2s ease forwards; }
        .modal-content { background: #222; padding: 25px; border-radius: 15px; text-align: center; width: 80%; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .close-modal-btn { position: absolute; top: 8px; right: 15px; background: none; border: none; color: #888; font-size: 1.5em; cursor: pointer; }
        .close-modal-btn:hover { color: white; }

        /* Modal Buttons */
        .modal-content h3 { margin-top: 0; color: #fff; margin-bottom: 10px; font-size: 1.2em;}
        .modal-content p { color: #ccc; font-size: 0.9em; margin-bottom: 20px; line-height: 1.4; }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; }
        .modal-buttons button { padding: 10px 15px; border-radius: 8px; flex: 1; font-size: 0.95em; border: none; cursor: pointer; font-weight: bold; }
        #btn-stay { background: #444; color: white; }
        #btn-leave { background: #dc3545; color: white; }

        /* Settings Modal */
        .settings-content { text-align: left; }
        .settings-content h3 { text-align: center; border-bottom: 1px solid #444; padding-bottom: 12px; margin-bottom: 15px; }
        .settings-item { background: #333; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; text-align: left; font-size: 0.95em; cursor: pointer; margin-bottom: 10px; transition: background 0.2s; font-weight: bold; }
        .settings-item:hover { background: #444; }
        .danger-btn { background: #dc3545; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 0.95em; cursor: pointer; width: 100%; transition: all 0.2s; margin-top: 10px; }
        .danger-btn:hover { background: #c82333; }
    </style>
</head>
<body>

<div class="chat-container" id="main-container">
    
    <div id="login-screen">
        <h1>Random Chat</h1>
        <p>Connect with strangers instantly.</p>
        <button id="login-btn" class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
            Sign in with Google
        </button>
    </div>

    <div id="chat-interface">
        <div class="top-nav" style="justify-content: center;">
            <h2>Random Chat</h2>
        </div>

        <div id="chat-box">
            <div class="message system-msg">Click below to start your first chat!</div>
        </div>
        
        <div class="controls">
            <input type="text" id="msg-input" placeholder="Type a message..." disabled autocomplete="off">
            <button id="send-btn" class="action-btn" disabled>Send</button>
        </div>
        
        <button id="start-btn">Start Chatting</button>
        <div id="skip-hint">⏬ Swipe/Drag up to skip ⏬</div>
    </div>

    <div id="profile-screen">
        <div class="top-nav">
            <div class="nav-item"></div>
            <h2>My Profile</h2>
            <div class="nav-item">
                <button id="open-settings-btn" class="settings-btn" title="Settings">⚙️</button>
            </div>
        </div>
        
        <div class="profile-content">
            <img id="page-profile-pic" class="profile-img-large" src="" alt="Profile">
            <h3 id="page-profile-name">User Name</h3>
            <p id="page-profile-email">user@email.com</p>
        </div>
    </div>

    <div id="bottom-nav">
        <div class="nav-tab active" id="tab-chat">
            <span class="nav-icon">💬</span>
            <span class="nav-label">Chat</span>
        </div>
        <div class="nav-tab" id="tab-profile">
            <img id="tab-profile-pic" class="tab-profile-pic" src="" alt="Profile">
            <span class="nav-label">Profile</span>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content settings-content">
            <button id="close-settings-btn" class="close-modal-btn">&times;</button>
            <h3>Settings</h3>
            <button class="settings-item">✏️ Edit Profile</button>
            <button class="settings-item">🔔 Notifications</button>
            <button class="settings-item">🔒 Privacy Policy</button>
            <button id="btn-logout" class="danger-btn">Sign Out</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Skip Stranger?</h3>
            <p>Are you sure you want to leave this conversation?</p>
            <div class="modal-buttons">
                <button id="btn-stay">Stay</button>
                <button id="btn-leave">Leave</button>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, onSnapshot, serverTimestamp, arrayUnion, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsFseykAMdcZhtW3fpg0nQiMd6datK55E",
        authDomain: "projectsocial-6db6d.firebaseapp.com",
        projectId: "projectsocial-6db6d",
        storageBucket: "projectsocial-6db6d.firebasestorage.app",
        messagingSenderId: "336903363566",
        appId: "1:336903363566:web:bfb18dfcb471bcf4484cff"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // DOM Elements
    const container = document.getElementById('main-container'); 
    const loginScreen = document.getElementById('login-screen');
    const chatInterface = document.getElementById('chat-interface');
    const profileScreen = document.getElementById('profile-screen');
    
    const bottomNav = document.getElementById('bottom-nav');
    const tabChat = document.getElementById('tab-chat');
    const tabProfile = document.getElementById('tab-profile');
    const tabProfilePic = document.getElementById('tab-profile-pic');
    
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const startBtn = document.getElementById('start-btn');
    const skipHint = document.getElementById('skip-hint');
    
    const loginBtn = document.getElementById('login-btn');
    const pageProfilePic = document.getElementById('page-profile-pic');
    const pageProfileName = document.getElementById('page-profile-name');
    const pageProfileEmail = document.getElementById('page-profile-email');
    
    const openSettingsBtn = document.getElementById('open-settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const closeSettingsBtn = document.getElementById('close-settings-btn');
    const btnLogout = document.getElementById('btn-logout');

    const confirmModal = document.getElementById('confirm-modal');
    const btnStay = document.getElementById('btn-stay');
    const btnLeave = document.getElementById('btn-leave');

    let currentRoomId = null;
    let unsubscribeRoom = null;
    let hasStarted = false;
    let isSkipping = false; 
    let isChatting = false; 
    let isConfirming = false; 
    let displayedMessageCount = 0; 
    let myUserId = null; 

    // --- NAVIGATION LOGIC & ANIMATIONS ---
    function showScreen(screenElement, animationClass) {
        loginScreen.style.display = 'none';
        chatInterface.style.display = 'none';
        profileScreen.style.display = 'none';
        
        screenElement.style.display = 'flex';
        
        if (animationClass) {
            screenElement.style.animation = `${animationClass} 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
        } else {
            screenElement.style.animation = `fadeIn 0.3s ease forwards`;
        }

        if (screenElement === chatInterface) {
            tabChat.classList.add('active');
            tabProfile.classList.remove('active');
        } else if (screenElement === profileScreen) {
            tabProfile.classList.add('active');
            tabChat.classList.remove('active');
        }
    }

    function openProfile() { showScreen(profileScreen, 'slideInFromRight'); }
    function closeProfileToChat() { 
        showScreen(chatInterface, 'slideInFromLeft'); 
        chatBox.scrollTo({ top: chatBox.scrollHeight }); 
    }

    tabChat.addEventListener('click', () => { if(chatInterface.style.display !== 'flex') closeProfileToChat(); });
    tabProfile.addEventListener('click', () => { if(profileScreen.style.display !== 'flex') openProfile(); });

    // --- UNIFIED MOUSE & TOUCH SWIPE LOGIC ---
    let startX = 0;
    let startY = 0;
    let isDragging = false;

    function handleInputStart(x, y) {
        startX = x;
        startY = y;
        isDragging = true;
    }

    function handleInputEnd(e, currentScreen, isTouch) {
        if (!isDragging) return;
        isDragging = false;

        let clientX = isTouch ? e.changedTouches[0].clientX : e.clientX;
        let clientY = isTouch ? e.changedTouches[0].clientY : e.clientY;

        let diffX = startX - clientX; // positive = swipe left, negative = swipe right
        let diffY = startY - clientY; // positive = swipe up, negative = swipe down

        let absX = Math.abs(diffX);
        let absY = Math.abs(diffY);

        // Horizontal Swipes (Switch Screens)
        if (absX > 50 && absX > absY) {
            if (currentScreen === 'chat' && diffX > 0) openProfile();
            else if (currentScreen === 'profile' && diffX < 0) closeProfileToChat();
        }
        // Vertical Swipes (Skip Stranger)
        else if (absY > 50 && absY > absX) {
            if (currentScreen === 'chat') handleSkipIntent(e, true);
        }
    }

    // Touch Bindings
    chatInterface.addEventListener('touchstart', (e) => handleInputStart(e.touches[0].clientX, e.touches[0].clientY));
    chatInterface.addEventListener('touchend', (e) => handleInputEnd(e, 'chat', true));
    
    profileScreen.addEventListener('touchstart', (e) => handleInputStart(e.touches[0].clientX, e.touches[0].clientY));
    profileScreen.addEventListener('touchend', (e) => handleInputEnd(e, 'profile', true));

    // Mouse Bindings (for Laptops)
    chatInterface.addEventListener('mousedown', (e) => handleInputStart(e.clientX, e.clientY));
    chatInterface.addEventListener('mouseup', (e) => handleInputEnd(e, 'chat', false));
    chatInterface.addEventListener('mouseleave', () => isDragging = false);

    profileScreen.addEventListener('mousedown', (e) => handleInputStart(e.clientX, e.clientY));
    profileScreen.addEventListener('mouseup', (e) => handleInputEnd(e, 'profile', false));
    profileScreen.addEventListener('mouseleave', () => isDragging = false);


    // --- SETTINGS MODAL LOGIC ---
    openSettingsBtn.addEventListener('click', () => { settingsModal.style.display = 'flex'; });
    closeSettingsBtn.addEventListener('click', () => { settingsModal.style.display = 'none'; });
    settingsModal.addEventListener('click', (e) => {
        if(e.target === settingsModal) settingsModal.style.display = 'none';
    });


    // --- AUTHENTICATION LOGIC ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            myUserId = user.uid;
            tabProfilePic.src = user.photoURL; 
            pageProfilePic.src = user.photoURL; 
            pageProfileName.textContent = user.displayName;
            pageProfileEmail.textContent = user.email;
            
            bottomNav.style.display = 'flex'; 
            showScreen(chatInterface);
        } else {
            myUserId = null;
            if (currentRoomId) updateDoc(doc(db, "rooms", currentRoomId), { status: "closed" }).catch(e => console.error(e));
            resetChat();
            
            bottomNav.style.display = 'none'; 
            showScreen(loginScreen);
            hasStarted = false;
            startBtn.style.display = 'block';
            skipHint.style.display = 'none';
        }
    });

    loginBtn.addEventListener('click', () => {
        signInWithPopup(auth, provider).catch((error) => {
            console.error("Error signing in:", error);
            alert("Failed to sign in.");
        });
    });

    btnLogout.addEventListener('click', () => {
        settingsModal.style.display = 'none'; 
        signOut(auth); 
    });


    // --- CORE CHAT LOGIC ---
    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    function resetChat() {
        chatBox.innerHTML = '';
        msgInput.disabled = true;
        sendBtn.disabled = true;
        isChatting = false;
        displayedMessageCount = 0;
        if (unsubscribeRoom) unsubscribeRoom();
        currentRoomId = null;
    }

    function setupRoomListener(roomId) {
        if (unsubscribeRoom) unsubscribeRoom();
        
        unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
            const data = snapshot.data();
            if (!data) return;

            if (data.status === "chatting" && !isChatting) {
                isChatting = true;
                appendMessage("You are now chatting! Say hi 👋", "system-msg");
                msgInput.disabled = false;
                sendBtn.disabled = false;
                msgInput.focus();
            }
            
            if (data.status === "closed" && isChatting) {
                appendMessage("Stranger disconnected.", "system-msg");
                isChatting = false;
                msgInput.disabled = true;
                sendBtn.disabled = true;
                appendMessage("⏬ Swipe or press ↓ to find someone new ⏬", "system-msg");
                if (isConfirming) hideConfirmModal();
            }

            if (isChatting && data.messages && data.messages.length > displayedMessageCount) {
                const newMessages = data.messages.slice(displayedMessageCount);
                newMessages.forEach(msg => {
                    if (msg.senderId !== myUserId) appendMessage(msg.text, "stranger-msg");
                });
                displayedMessageCount = data.messages.length;
            }
        });
    }

    async function findStranger() {
        if (!myUserId) return; 
        resetChat();
        appendMessage("Looking for a stranger...", "system-msg");

        const roomsRef = collection(db, "rooms");
        const q = query(roomsRef, where("status", "==", "waiting"), limit(1)); 
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
            currentRoomId = querySnapshot.docs[0].id;
            await updateDoc(doc(db, "rooms", currentRoomId), { status: "chatting", peerId: myUserId });
            setupRoomListener(currentRoomId);
        } else {
            const newRoom = await addDoc(roomsRef, { status: "waiting", creatorId: myUserId, createdAt: serverTimestamp(), messages: [] });
            currentRoomId = newRoom.id;
            setupRoomListener(currentRoomId);
        }
    }

    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !currentRoomId) return;

        msgInput.value = '';
        appendMessage(text, "my-msg"); 
        displayedMessageCount++; 

        await updateDoc(doc(db, "rooms", currentRoomId), {
            messages: arrayUnion({ text: text, senderId: myUserId, timestamp: Date.now() })
        });
    }


    // --- KEYBOARD CONTROLS & SKIP LOGIC ---
    function showConfirmModal() { isConfirming = true; confirmModal.style.display = 'flex'; }
    function hideConfirmModal() { isConfirming = false; confirmModal.style.display = 'none'; }
    btnStay.addEventListener('click', hideConfirmModal);
    btnLeave.addEventListener('click', () => { hideConfirmModal(); executeSkipAnimation(); });

    function handleSkipIntent(e, isScrollEvent) {
        if (!hasStarted || isSkipping || isConfirming || !myUserId || profileScreen.style.display === 'flex') return;

        // Prevent skip if scrolling inside the chat box to read old messages
        if (isScrollEvent && e && e.target && e.target.closest('#chat-box')) {
            const box = chatBox;
            const isAtBottom = Math.abs((box.scrollHeight - box.scrollTop) - box.clientHeight) < 2;
            if (!isAtBottom) return; 
        }

        if (isChatting && currentRoomId) showConfirmModal();
        else executeSkipAnimation();
    }

    async function executeSkipAnimation() {
        isSkipping = true;
        if (currentRoomId) updateDoc(doc(db, "rooms", currentRoomId), { status: "closed" }).catch(e => console.error(e));

        container.style.transform = 'translateY(-100vh) scale(0.9)';
        container.style.opacity = '0';

        setTimeout(() => {
            container.style.transition = 'none'; 
            container.style.transform = 'translateY(100vh) scale(0.9)'; 
            findStranger(); 
            void container.offsetWidth; 
            container.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease-in-out';
            container.style.transform = 'translateY(0) scale(1)'; 
            container.style.opacity = '1';

            setTimeout(() => { isSkipping = false; }, 500); 
        }, 300); 
    }

    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none'; skipHint.style.display = 'block'; hasStarted = true; findStranger();
    });

    // Mouse Wheel
    window.addEventListener('wheel', (e) => { if (e.deltaY > 20) handleSkipIntent(e, true); });

    // Keyboards
    window.addEventListener('keydown', (e) => {
        if (document.activeElement === msgInput || isConfirming || settingsModal.style.display === 'flex') return;

        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
            handleSkipIntent(e, false);
        } else if (e.key === 'ArrowRight') {
            if (chatInterface.style.display === 'flex' || chatInterface.style.display === '') openProfile();
        } else if (e.key === 'ArrowLeft') {
            if (profileScreen.style.display === 'flex') closeProfileToChat();
        }
    });

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    window.addEventListener('beforeunload', () => {
        if (currentRoomId) updateDoc(doc(db, "rooms", currentRoomId), { status: "closed" });
    });
</script>
</body>
</html>
