<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Chat</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .chat-container { width: 400px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 20px; display: flex; flex-direction: column; height: 600px; z-index: 10; }
        #chat-box { flex-grow: 1; border: 1px solid #ccc; border-radius: 4px; padding: 10px; overflow-y: auto; margin-bottom: 10px; background: #fafafa; }
        .message { margin-bottom: 8px; padding: 8px; border-radius: 4px; max-width: 80%; }
        .my-msg { background: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        .stranger-msg { background: #e9ecef; color: black; align-self: flex-start; }
        .system-msg { text-align: center; color: #888; font-size: 0.9em; font-style: italic; }
        .controls { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; border: none; background: #28a745; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #start-btn { background: #dc3545; margin-top: 10px; width: 100%; font-size: 1.1em; padding: 15px; }
        #skip-hint { display: none; text-align: center; color: #666; font-size: 0.85em; margin-top: 15px; background: #eee; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2 style="text-align: center; margin-top: 0;">Random Chat</h2>
    <div id="chat-box">
        <div class="message system-msg">Click below to start your first chat!</div>
    </div>
    <div class="controls">
        <input type="text" id="msg-input" placeholder="Type a message..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>
    <button id="start-btn">Start Chatting</button>
    <div id="skip-hint">⏬ Scroll down outside the chat, swipe up, or press ↓ to skip ⏬</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, onSnapshot, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsFseykAMdcZhtW3fpg0nQiMd6datK55E",
        authDomain: "projectsocial-6db6d.firebaseapp.com",
        projectId: "projectsocial-6db6d",
        storageBucket: "projectsocial-6db6d.firebasestorage.app",
        messagingSenderId: "336903363566",
        appId: "1:336903363566:web:bfb18dfcb471bcf4484cff",
        measurementId: "G-81LG54HW26"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const startBtn = document.getElementById('start-btn');
    const skipHint = document.getElementById('skip-hint');

    let currentRoomId = null;
    let unsubscribeRoom = null;
    let unsubscribeMessages = null;
    let hasStarted = false;
    let isSkipping = false; 
    let isChatting = false; // New state to track if we are actively talking
    const myUserId = "user_" + Math.random().toString(36).substr(2, 9);

    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function resetChat() {
        chatBox.innerHTML = '';
        msgInput.disabled = true;
        sendBtn.disabled = true;
        isChatting = false;
        if (unsubscribeRoom) unsubscribeRoom();
        if (unsubscribeMessages) unsubscribeMessages();
        currentRoomId = null;
    }

    // --- NEW LISTENER LOGIC ---
    function setupRoomListener(roomId) {
        if (unsubscribeRoom) unsubscribeRoom();
        
        unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
            const data = snapshot.data();
            if (!data) return;

            // If we were waiting and someone joined
            if (data.status === "chatting" && !isChatting) {
                startChat(roomId);
            }
            
            // If the OTHER person skipped and closed the room
            if (data.status === "closed" && isChatting) {
                appendMessage("Stranger disconnected.", "system-msg");
                isChatting = false;
                msgInput.disabled = true;
                sendBtn.disabled = true;
                if (unsubscribeMessages) unsubscribeMessages(); // Stop listening to messages
                appendMessage("⏬ Scroll or press ↓ to find someone new ⏬", "system-msg");
            }
        });
    }

    async function findStranger() {
        resetChat();
        appendMessage("Looking for a stranger...", "system-msg");

        const roomsRef = collection(db, "rooms");
        const q = query(roomsRef, where("status", "==", "waiting"));
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
            const roomDoc = querySnapshot.docs[0];
            currentRoomId = roomDoc.id;
            
            await updateDoc(doc(db, "rooms", currentRoomId), {
                status: "chatting",
                peerId: myUserId
            });
            
            setupRoomListener(currentRoomId);
            startChat(currentRoomId);
        } else {
            const newRoom = await addDoc(roomsRef, {
                status: "waiting",
                creatorId: myUserId,
                createdAt: serverTimestamp()
            });
            currentRoomId = newRoom.id;
            
            setupRoomListener(currentRoomId);
        }
    }

    function startChat(roomId) {
        isChatting = true;
        appendMessage("You are now chatting with a random stranger. Say hi!", "system-msg");
        msgInput.disabled = false;
        sendBtn.disabled = false;
        msgInput.focus();

        const messagesRef = collection(db, "rooms", roomId, "messages");
        const messagesQuery = query(messagesRef, orderBy("timestamp", "asc"));

        if (unsubscribeMessages) unsubscribeMessages();
        unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const msgData = change.doc.data();
                    if (msgData.senderId !== myUserId) {
                        appendMessage(msgData.text, "stranger-msg");
                    }
                }
            });
        });
    }

    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !currentRoomId) return;

        msgInput.value = '';
        appendMessage(text, "my-msg"); 

        await addDoc(collection(db, "rooms", currentRoomId, "messages"), {
            text: text,
            senderId: myUserId,
            timestamp: serverTimestamp()
        });
    }

    // --- UPDATED SKIP LOGIC ---
    async function skipToNext() {
        if (!hasStarted || isSkipping) return;
        isSkipping = true;

        if (currentRoomId) {
            appendMessage("You skipped to the next person.", "system-msg");
            
            // Save the ID before we reset, so we can tell Firebase to close it
            const roomToClose = currentRoomId; 
            
            // Tell Firebase the room is dead in the background
            updateDoc(doc(db, "rooms", roomToClose), {
                status: "closed"
            }).catch(e => console.error("Error closing room", e));
        }
        
        // Immediately start finding the next person
        findStranger();

        setTimeout(() => {
            isSkipping = false;
        }, 1500); 
    }

    // Events
    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none'; 
        skipHint.style.display = 'block'; 
        hasStarted = true;
        findStranger();
    });

    window.addEventListener('wheel', (e) => {
        if (e.target.closest('#chat-box')) return; 
        if (e.deltaY > 20) skipToNext();
    });

    let touchStartY = 0;
    window.addEventListener('touchstart', (e) => {
        touchStartY = e.changedTouches[0].screenY;
    });
    
    window.addEventListener('touchend', (e) => {
        let touchEndY = e.changedTouches[0].screenY;
        if (touchStartY - touchEndY > 50) {
            if (e.target.closest('#chat-box')) return;
            skipToNext();
        }
    });

    window.addEventListener('keydown', (e) => {
        if (document.activeElement === msgInput) return;
        if (e.key === 'ArrowDown') skipToNext();
    });

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Handle closing the browser tab completely
    window.addEventListener('beforeunload', () => {
        if (currentRoomId) {
            updateDoc(doc(db, "rooms", currentRoomId), { status: "closed" });
        }
    });

</script>
</body>
</html>
