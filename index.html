<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Chat - Reels Mode</title>
    <style>
        /* Base Theme with Animated Gradient */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(-45deg, #0a0a0a, #1a1a2e, #16213e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Main Chat Window - NOW WITH TRANSITIONS FOR SWIPING */
        .chat-container { 
            width: 100%;
            max-width: 450px; 
            background: #1a1a1a; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 20px rgba(0, 123, 255, 0.1); 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            height: 85vh; 
            max-height: 750px;
            z-index: 10; 
            border: 1px solid #2a2a2a;
            
            /* This is the magic that makes the whole box slide smoothly */
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease-in-out;
            will-change: transform, opacity;
        }

        h2 { text-align: center; margin-top: 0; font-weight: 600; letter-spacing: 1px; color: #eee; }

        #chat-box { 
            flex-grow: 1; 
            border-radius: 12px; 
            padding: 15px; 
            overflow-y: auto; 
            margin-bottom: 15px; 
            background: #111111; 
            display: flex;
            flex-direction: column;
            gap: 12px; 
        }

        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        #chat-box::-webkit-scrollbar-thumb:hover { background: #555; }

        .message { 
            padding: 12px 18px; 
            border-radius: 20px; 
            max-width: 75%; 
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 0.95em;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            opacity: 0; 
            transform-origin: bottom;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .my-msg { background: linear-gradient(135deg, #0062cc, #007bff); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2); }
        .stranger-msg { background: #2d2d2d; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); }
        .system-msg { text-align: center; color: #888; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; align-self: center; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; }

        .controls { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 14px 20px; background: #222; border: 1px solid #333; color: white; border-radius: 25px; outline: none; font-size: 1em; transition: all 0.3s ease; }
        input[type="text"]:focus { border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.2); }
        input[type="text"]:disabled { background: #1a1a1a; cursor: not-allowed; }

        button { padding: 0 20px; border: none; background: #007bff; color: white; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.9em; }
        button:hover:not(:disabled) { background: #0056b3; transform: translateY(-2px); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }

        #start-btn { background: linear-gradient(135deg, #ff416c, #ff4b2b); margin-top: 15px; width: 100%; font-size: 1.1em; padding: 16px; border-radius: 12px; box-shadow: 0 4px 15px rgba(255, 65, 108, 0.3); }
        #start-btn:hover { background: linear-gradient(135deg, #ff4b2b, #ff416c); box-shadow: 0 6px 20px rgba(255, 65, 108, 0.5); }

        #skip-hint { display: none; text-align: center; color: #777; font-size: 0.85em; margin-top: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

<div class="chat-container" id="main-container">
    <h2>Random Chat</h2>
    <div id="chat-box">
        <div class="message system-msg">Click below to start your first chat!</div>
    </div>
    <div class="controls">
        <input type="text" id="msg-input" placeholder="Type a message..." disabled autocomplete="off">
        <button id="send-btn" disabled>Send</button>
    </div>
    <button id="start-btn">Start Chatting</button>
    <div id="skip-hint">⏬ Swipe up, scroll, or press ↓ to skip ⏬</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, onSnapshot, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsFseykAMdcZhtW3fpg0nQiMd6datK55E",
        authDomain: "projectsocial-6db6d.firebaseapp.com",
        projectId: "projectsocial-6db6d",
        storageBucket: "projectsocial-6db6d.firebasestorage.app",
        messagingSenderId: "336903363566",
        appId: "1:336903363566:web:bfb18dfcb471bcf4484cff",
        measurementId: "G-81LG54HW26"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    const container = document.getElementById('main-container'); // Grab the whole box for animation
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const startBtn = document.getElementById('start-btn');
    const skipHint = document.getElementById('skip-hint');

    let currentRoomId = null;
    let unsubscribeRoom = null;
    let unsubscribeMessages = null;
    let hasStarted = false;
    let isSkipping = false; 
    let isChatting = false; 
    const myUserId = "user_" + Math.random().toString(36).substr(2, 9);

    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    function resetChat() {
        chatBox.innerHTML = '';
        msgInput.disabled = true;
        sendBtn.disabled = true;
        isChatting = false;
        if (unsubscribeRoom) unsubscribeRoom();
        if (unsubscribeMessages) unsubscribeMessages();
        currentRoomId = null;
    }

    function setupRoomListener(roomId) {
        if (unsubscribeRoom) unsubscribeRoom();
        
        unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
            const data = snapshot.data();
            if (!data) return;

            if (data.status === "chatting" && !isChatting) {
                startChat(roomId);
            }
            
            if (data.status === "closed" && isChatting) {
                appendMessage("Stranger disconnected.", "system-msg");
                isChatting = false;
                msgInput.disabled = true;
                sendBtn.disabled = true;
                if (unsubscribeMessages) unsubscribeMessages(); 
                appendMessage("⏬ Swipe or press ↓ to find someone new ⏬", "system-msg");
            }
        });
    }

    async function findStranger() {
        resetChat();
        appendMessage("Looking for a stranger...", "system-msg");

        const roomsRef = collection(db, "rooms");
        const q = query(roomsRef, where("status", "==", "waiting"));
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
            const roomDoc = querySnapshot.docs[0];
            currentRoomId = roomDoc.id;
            
            await updateDoc(doc(db, "rooms", currentRoomId), {
                status: "chatting",
                peerId: myUserId
            });
            
            setupRoomListener(currentRoomId);
            startChat(currentRoomId);
        } else {
            const newRoom = await addDoc(roomsRef, {
                status: "waiting",
                creatorId: myUserId,
                createdAt: serverTimestamp()
            });
            currentRoomId = newRoom.id;
            
            setupRoomListener(currentRoomId);
        }
    }

    function startChat(roomId) {
        isChatting = true;
        appendMessage("You are now chatting! Say hi 👋", "system-msg");
        msgInput.disabled = false;
        sendBtn.disabled = false;
        msgInput.focus();

        const messagesRef = collection(db, "rooms", roomId, "messages");
        const messagesQuery = query(messagesRef, orderBy("timestamp", "asc"));

        if (unsubscribeMessages) unsubscribeMessages();
        unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const msgData = change.doc.data();
                    if (msgData.senderId !== myUserId) {
                        appendMessage(msgData.text, "stranger-msg");
                    }
                }
            });
        });
    }

    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !currentRoomId) return;

        msgInput.value = '';
        appendMessage(text, "my-msg"); 

        await addDoc(collection(db, "rooms", currentRoomId, "messages"), {
            text: text,
            senderId: myUserId,
            timestamp: serverTimestamp()
        });
    }

    // --- REELS SWIPE ANIMATION LOGIC ---
    async function skipToNext() {
        if (!hasStarted || isSkipping) return;
        isSkipping = true;

        // 1. Tell Firebase we are leaving
        if (currentRoomId) {
            const roomToClose = currentRoomId; 
            updateDoc(doc(db, "rooms", roomToClose), { status: "closed" }).catch(e => console.error(e));
        }

        // 2. Animate the current box UP and fading out
        container.style.transform = 'translateY(-100vh) scale(0.9)';
        container.style.opacity = '0';

        // Wait 300ms for it to slide off screen
        setTimeout(() => {
            // 3. While invisible, teleport it to the bottom and reset the chat
            container.style.transition = 'none'; // Turn off animation temporarily
            container.style.transform = 'translateY(100vh) scale(0.9)'; // Move to bottom
            
            findStranger(); // Clear chat, say "Looking for stranger..."

            // 4. Force the browser to register the teleport, then slide it back up
            void container.offsetWidth; // This is a magic trick to force CSS to update instantly

            container.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease-in-out';
            container.style.transform = 'translateY(0) scale(1)'; // Move to center
            container.style.opacity = '1';

            // 5. Unlock the skip button after it finishes arriving
            setTimeout(() => {
                isSkipping = false;
            }, 500); 

        }, 300); // 300ms matches the CSS transition out time
    }

    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none'; 
        skipHint.style.display = 'block'; 
        hasStarted = true;
        findStranger();
    });

    // Scroll Triggers
    window.addEventListener('wheel', (e) => {
        if (e.target.closest('#chat-box')) return; 
        if (e.deltaY > 20) skipToNext();
    });

    let touchStartY = 0;
    window.addEventListener('touchstart', (e) => {
        touchStartY = e.changedTouches[0].screenY;
    });
    
    window.addEventListener('touchend', (e) => {
        let touchEndY = e.changedTouches[0].screenY;
        if (touchStartY - touchEndY > 50) {
            if (e.target.closest('#chat-box')) return;
            skipToNext();
        }
    });

    window.addEventListener('keydown', (e) => {
        if (document.activeElement === msgInput) return;
        if (e.key === 'ArrowDown') skipToNext();
    });

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    window.addEventListener('beforeunload', () => {
        if (currentRoomId) {
            updateDoc(doc(db, "rooms", currentRoomId), { status: "closed" });
        }
    });
</script>
</body>
</html>
