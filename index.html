<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Chat</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 20px; display: flex; flex-direction: column; height: 600px; }
        #chat-box { flex-grow: 1; border: 1px solid #ccc; border-radius: 4px; padding: 10px; overflow-y: auto; margin-bottom: 10px; background: #fafafa; }
        .message { margin-bottom: 8px; padding: 8px; border-radius: 4px; max-width: 80%; }
        .my-msg { background: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        .stranger-msg { background: #e9ecef; color: black; align-self: flex-start; }
        .system-msg { text-align: center; color: #888; font-size: 0.9em; font-style: italic; }
        .controls { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; border: none; background: #28a745; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #next-btn { background: #dc3545; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2 style="text-align: center; margin-top: 0;">Random Chat</h2>
    <div id="chat-box">
        <div class="message system-msg">Click "Find Stranger" to start!</div>
    </div>
    <div class="controls">
        <input type="text" id="msg-input" placeholder="Type a message..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>
    <button id="next-btn" style="margin-top: 10px; width: 100%;">Find Stranger</button>
</div>

<script type="module">
    // 1. Import Firebase modules using the correct browser CDN links
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, onSnapshot, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 2. Your web app's Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDsFseykAMdcZhtW3fpg0nQiMd6datK55E",
        authDomain: "projectsocial-6db6d.firebaseapp.com",
        projectId: "projectsocial-6db6d",
        storageBucket: "projectsocial-6db6d.firebasestorage.app",
        messagingSenderId: "336903363566",
        appId: "1:336903363566:web:bfb18dfcb471bcf4484cff",
        measurementId: "G-81LG54HW26"
    };

    // 3. Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // DOM Elements
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const nextBtn = document.getElementById('next-btn');

    // State
    let currentRoomId = null;
    let unsubscribeRoom = null;
    let unsubscribeMessages = null;
    const myUserId = "user_" + Math.random().toString(36).substr(2, 9); // Generate a random ID for this session

    // UI Helpers
    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function resetChat() {
        chatBox.innerHTML = '';
        msgInput.disabled = true;
        sendBtn.disabled = true;
        nextBtn.textContent = 'Find Stranger';
        if (unsubscribeRoom) unsubscribeRoom();
        if (unsubscribeMessages) unsubscribeMessages();
        currentRoomId = null;
    }

    // Matchmaking Logic
    async function findStranger() {
        resetChat();
        appendMessage("Looking for a stranger...", "system-msg");
        nextBtn.disabled = true;

        const roomsRef = collection(db, "rooms");
        
        // 1. Try to find a waiting room
        const q = query(roomsRef, where("status", "==", "waiting"));
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
            // Join an existing room
            const roomDoc = querySnapshot.docs[0];
            currentRoomId = roomDoc.id;
            
            await updateDoc(doc(db, "rooms", currentRoomId), {
                status: "chatting",
                peerId: myUserId
            });
            
            startChat(currentRoomId, false);
        } else {
            // 2. Create a new room and wait
            const newRoom = await addDoc(roomsRef, {
                status: "waiting",
                creatorId: myUserId,
                createdAt: serverTimestamp()
            });
            currentRoomId = newRoom.id;
            
            // Listen for someone to join
            unsubscribeRoom = onSnapshot(doc(db, "rooms", currentRoomId), (snapshot) => {
                const data = snapshot.data();
                if (data && data.status === "chatting") {
                    startChat(currentRoomId, true);
                }
            });
        }
    }

    // Chat Logic
    function startChat(roomId, isCreator) {
        if (unsubscribeRoom && isCreator) unsubscribeRoom(); // Stop listening to room status once connected
        
        appendMessage("You are now chatting with a random stranger. Say hi!", "system-msg");
        msgInput.disabled = false;
        sendBtn.disabled = false;
        nextBtn.textContent = 'Disconnect';
        nextBtn.disabled = false;

        // Listen for messages
        const messagesRef = collection(db, "rooms", roomId, "messages");
        const messagesQuery = query(messagesRef, orderBy("timestamp", "asc"));

        unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const msgData = change.doc.data();
                    // Don't show our own messages twice (we append them optimistically on send)
                    if (msgData.senderId !== myUserId) {
                        appendMessage(msgData.text, "stranger-msg");
                    }
                }
            });
        });
    }

    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !currentRoomId) return;

        msgInput.value = '';
        appendMessage(text, "my-msg"); // Show immediately on UI

        await addDoc(collection(db, "rooms", currentRoomId, "messages"), {
            text: text,
            senderId: myUserId,
            timestamp: serverTimestamp()
        });
    }

    // Event Listeners
    nextBtn.addEventListener('click', () => {
        if (currentRoomId && nextBtn.textContent === 'Disconnect') {
            appendMessage("You disconnected.", "system-msg");
            resetChat();
            nextBtn.disabled = false;
        } else {
            findStranger();
        }
    });

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
