<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Chat - Reels Mode</title>
    <style>
        /* Base Theme with Animated Gradient */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(-45deg, #0a0a0a, #1a1a2e, #16213e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Main Chat Window */
        .chat-container { 
            width: 100%;
            max-width: 450px; 
            background: #1a1a1a; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 20px rgba(0, 123, 255, 0.1); 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            height: 85vh; 
            max-height: 750px;
            z-index: 10; 
            border: 1px solid #2a2a2a;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease-in-out;
            will-change: transform, opacity;
            position: relative; /* Needed for the modal overlay */
        }

        h2 { text-align: center; margin-top: 0; font-weight: 600; letter-spacing: 1px; color: #eee; }

        #chat-box { 
            flex-grow: 1; 
            border-radius: 12px; 
            padding: 15px; 
            overflow-y: auto; 
            margin-bottom: 15px; 
            background: #111111; 
            display: flex;
            flex-direction: column;
            gap: 12px; 
        }

        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        #chat-box::-webkit-scrollbar-thumb:hover { background: #555; }

        .message { 
            padding: 12px 18px; 
            border-radius: 20px; 
            max-width: 75%; 
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 0.95em;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            opacity: 0; 
            transform-origin: bottom;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .my-msg { background: linear-gradient(135deg, #0062cc, #007bff); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2); }
        .stranger-msg { background: #2d2d2d; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); }
        .system-msg { text-align: center; color: #888; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; align-self: center; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; }

        .controls { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 14px 20px; background: #222; border: 1px solid #333; color: white; border-radius: 25px; outline: none; font-size: 1em; transition: all 0.3s ease; }
        input[type="text"]:focus { border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.2); }
        input[type="text"]:disabled { background: #1a1a1a; cursor: not-allowed; }

        button { padding: 0 20px; border: none; background: #007bff; color: white; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.9em; }
        button:hover:not(:disabled) { background: #0056b3; transform: translateY(-2px); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }

        #start-btn { background: linear-gradient(135deg, #ff416c, #ff4b2b); margin-top: 15px; width: 100%; font-size: 1.1em; padding: 16px; border-radius: 12px; box-shadow: 0 4px 15px rgba(255, 65, 108, 0.3); }
        #start-btn:hover { background: linear-gradient(135deg, #ff4b2b, #ff416c); box-shadow: 0 6px 20px rgba(255, 65, 108, 0.5); }

        #skip-hint { display: none; text-align: center; color: #777; font-size: 0.85em; margin-top: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* --- NEW MODAL STYLES --- */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.2s ease forwards;
        }

        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-content h3 { margin-top: 0; color: #fff; margin-bottom: 10px; }
        .modal-content p { color: #ccc; font-size: 0.9em; margin-bottom: 25px; line-height: 1.4; }
        
        .modal-buttons { display: flex; gap: 15px; justify-content: center; }
        .modal-buttons button { padding: 12px 20px; border-radius: 8px; flex: 1; font-size: 1em; }
        #btn-stay { background: #444; color: white; }
        #btn-stay:hover { background: #555; }
        #btn-leave { background: #dc3545; color: white; }
        #btn-leave:hover { background: #c82333; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="chat-container" id="main-container">
    <h2>Random Chat</h2>
    <div id="chat-box">
        <div class="message system-msg">Click below to start your first chat!</div>
    </div>
    <div class="controls">
        <input type="text" id="msg-input" placeholder="Type a message..." disabled autocomplete="off">
        <button id="send-btn" disabled>Send</button>
    </div>
    <button id="start-btn">Start Chatting</button>
    <div id="skip-hint">⏬ Swipe up, scroll, or press ↓ to skip ⏬</div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Skip Stranger?</h3>
            <p>Are you sure you want to leave this conversation?</p>
            <div class="modal-buttons">
                <button id="btn-stay">Stay</button>
                <button id="btn-leave">Leave</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, onSnapshot, serverTimestamp, arrayUnion, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsFseykAMdcZhtW3fpg0nQiMd6datK55E",
        authDomain: "projectsocial-6db6d.firebaseapp.com",
        projectId: "projectsocial-6db6d",
        storageBucket: "projectsocial-6db6d.firebasestorage.app",
        messagingSenderId: "336903363566",
        appId: "1:336903363566:web:bfb18dfcb471bcf4484cff",
        measurementId: "G-81LG54HW26"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    const container = document.getElementById('main-container'); 
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const startBtn = document.getElementById('start-btn');
    const skipHint = document.getElementById('skip-hint');
    
    // Modal Elements
    const confirmModal = document.getElementById('confirm-modal');
    const btnStay = document.getElementById('btn-stay');
    const btnLeave = document.getElementById('btn-leave');

    let currentRoomId = null;
    let unsubscribeRoom = null;
    let hasStarted = false;
    let isSkipping = false; 
    let isChatting = false; 
    let isConfirming = false; // Tracks if the popup is currently open
    let displayedMessageCount = 0; 
    const myUserId = "user_" + Math.random().toString(36).substr(2, 9);

    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    function resetChat() {
        chatBox.innerHTML = '';
        msgInput.disabled = true;
        sendBtn.disabled = true;
        isChatting = false;
        displayedMessageCount = 0;
        if (unsubscribeRoom) unsubscribeRoom();
        currentRoomId = null;
    }

    function setupRoomListener(roomId) {
        if (unsubscribeRoom) unsubscribeRoom();
        
        unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
            const data = snapshot.data();
            if (!data) return;

            if (data.status === "chatting" && !isChatting) {
                isChatting = true;
                appendMessage("You are now chatting! Say hi 👋", "system-msg");
                msgInput.disabled = false;
                sendBtn.disabled = false;
                msgInput.focus();
            }
            
            if (data.status === "closed" && isChatting) {
                appendMessage("Stranger disconnected.", "system-msg");
                isChatting = false;
                msgInput.disabled = true;
                sendBtn.disabled = true;
                appendMessage("⏬ Swipe or press ↓ to find someone new ⏬", "system-msg");
                
                // If they got disconnected while the modal was open, close it
                if (isConfirming) hideConfirmModal();
            }

            if (isChatting && data.messages && data.messages.length > displayedMessageCount) {
                const newMessages = data.messages.slice(displayedMessageCount);
                newMessages.forEach(msg => {
                    if (msg.senderId !== myUserId) {
                        appendMessage(msg.text, "stranger-msg");
                    }
                });
                displayedMessageCount = data.messages.length;
            }
        });
    }

    async function findStranger() {
        resetChat();
        appendMessage("Looking for a stranger...", "system-msg");

        const roomsRef = collection(db, "rooms");
        const q = query(roomsRef, where("status", "==", "waiting"), limit(1)); // Speed upgrade applied!
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
            const roomDoc = querySnapshot.docs[0];
            currentRoomId = roomDoc.id;
            
            await updateDoc(doc(db, "rooms", currentRoomId), {
                status: "chatting",
                peerId: myUserId
            });
            
            setupRoomListener(currentRoomId);
        } else {
            const newRoom = await addDoc(roomsRef, {
                status: "waiting",
                creatorId: myUserId,
                createdAt: serverTimestamp(),
                messages: [] 
            });
            currentRoomId = newRoom.id;
            
            setupRoomListener(currentRoomId);
        }
    }

    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !currentRoomId) return;

        msgInput.value = '';
        appendMessage(text, "my-msg"); 
        displayedMessageCount++; 

        await updateDoc(doc(db, "rooms", currentRoomId), {
            messages: arrayUnion({
                text: text,
                senderId: myUserId,
                timestamp: Date.now()
            })
        });
    }

    // --- MODAL LOGIC ---
    function showConfirmModal() {
        isConfirming = true;
        confirmModal.style.display = 'flex';
    }

    function hideConfirmModal() {
        isConfirming = false;
        confirmModal.style.display = 'none';
    }

    btnStay.addEventListener('click', hideConfirmModal);
    
    btnLeave.addEventListener('click', () => {
        hideConfirmModal();
        executeSkipAnimation();
    });

    // --- SMART SCROLL INTENT LOGIC ---
    function handleSkipIntent(e, isScrollEvent) {
        if (!hasStarted || isSkipping || isConfirming) return;

        // The Smart Scroll fix:
        if (isScrollEvent && e.target.closest('#chat-box')) {
            const box = chatBox;
            // Check if user is scrolled to the absolute bottom (allowing 2px for browser rendering math)
            const isAtBottom = Math.abs((box.scrollHeight - box.scrollTop) - box.clientHeight) < 2;
            
            // If they are NOT at the bottom, they are just reading old messages. Let them scroll.
            if (!isAtBottom) return; 
        }

        // Only show popup if they are actively talking to someone
        if (isChatting && currentRoomId) {
            showConfirmModal();
        } else {
            // If they are just waiting or the stranger disconnected, let them skip instantly without asking
            executeSkipAnimation();
        }
    }

    // --- ACTUAL SKIP ANIMATION ---
    async function executeSkipAnimation() {
        isSkipping = true;

        if (currentRoomId) {
            const roomToClose = currentRoomId; 
            updateDoc(doc(db, "rooms", roomToClose), { status: "closed" }).catch(e => console.error(e));
        }

        container.style.transform = 'translateY(-100vh) scale(0.9)';
        container.style.opacity = '0';

        setTimeout(() => {
            container.style.transition = 'none'; 
            container.style.transform = 'translateY(100vh) scale(0.9)'; 
            
            findStranger(); 

            void container.offsetWidth; 

            container.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease-in-out';
            container.style.transform = 'translateY(0) scale(1)'; 
            container.style.opacity = '1';

            setTimeout(() => {
                isSkipping = false;
            }, 500); 

        }, 300); 
    }

    // --- EVENT LISTENERS ---
    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none'; 
        skipHint.style.display = 'block'; 
        hasStarted = true;
        findStranger();
    });

    window.addEventListener('wheel', (e) => {
        if (e.deltaY > 20) handleSkipIntent(e, true);
    });

    let touchStartY = 0;
    window.addEventListener('touchstart', (e) => {
        touchStartY = e.changedTouches[0].screenY;
    });
    
    window.addEventListener('touchend', (e) => {
        let touchEndY = e.changedTouches[0].screenY;
        if (touchStartY - touchEndY > 50) {
            handleSkipIntent(e, true);
        }
    });

    window.addEventListener('keydown', (e) => {
        if (document.activeElement === msgInput) return;
        if (e.key === 'ArrowDown') handleSkipIntent(e, false);
    });

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    window.addEventListener('beforeunload', () => {
        if (currentRoomId) {
            updateDoc(doc(db, "rooms", currentRoomId), { status: "closed" });
        }
    });
</script>
</body>
</html>
